<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浙江省交互地图 · linxxery.com</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  * { margin:0; padding:0; }
  html, body, #map { width:100%; height:100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var map = L.map('map').setView([29.5, 120.5], 8);

L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
    subdomains: '1234',
    attribution: 'linxxery.com'
}).addTo(map);

var cities = [
    ['杭州(省会)', 30.274, 120.155],
    ['宁波', 29.868, 121.550],
    ['温州', 27.994, 120.699],
    ['嘉兴', 30.747, 120.756],
    ['湖州', 30.893, 120.088],
    ['绍兴', 30.031, 120.580],
    ['金华', 29.079, 119.652],
    ['衢州', 28.936, 118.875],
    ['舟山', 30.036, 122.207],
    ['台州', 28.656, 121.421],
    ['丽水', 28.467, 119.923]
];

cities.forEach(function(c) {
    L.marker([c[1], c[2]]).addTo(map).bindPopup('<b>'+c[0]+'</b>');
});

L.control({position:'topleft'}).onAdd = function() {
    var d = document.createElement('div');
    d.innerHTML = '<div style="background:rgba(0,0,0,0.7);color:white;padding:10px 14px;border-radius:6px;font:14px Microsoft YaHei,sans-serif;"><b>浙江省</b> · 11市<span style="font-size:11px;opacity:0.6;margin-left:8px;">linxxery.com</span></div>';
    return d;
};
</script>
</body>
</html>
