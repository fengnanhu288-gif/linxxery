<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>linxxery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#fff;font-family:"Microsoft YaHei","PingFang SC",sans-serif;
}
.logo{font-size:56px;font-weight:700;color:#333;margin-bottom:8px;letter-spacing:2px}
.logo span{color:#4e6ef2}
.sub{font-size:14px;color:#999;margin-bottom:36px}
.search-wrap{display:flex;align-items:center;width:640px;max-width:90vw;
  border:2px solid #e0e0e0;border-radius:28px;overflow:hidden;transition:border-color .2s}
.search-wrap:focus-within{border-color:#4e6ef2}
.search-wrap input{flex:1;border:none;outline:none;padding:14px 20px;font-size:16px}
.search-wrap input::placeholder{color:#bbb}
.search-wrap button{background:#4e6ef2;color:#fff;border:none;padding:14px 28px;font-size:16px;
  cursor:pointer;transition:background .2s;white-space:nowrap}
.search-wrap button:hover{background:#3b5de7}
.links{margin-top:40px;display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.links a{color:#666;text-decoration:none;font-size:14px;transition:color .2s}
.links a:hover{color:#4e6ef2}
.footer{position:fixed;bottom:20px;color:#bbb;font-size:12px}
</style>
</head>
<body>
<div class="logo">lin<span>x</span>xery</div>
<div class="sub">搜索 · 发现 · 探索</div>
<form class="search-wrap" action="https://www.baidu.com/s" target="_blank">
  <input name="wd" type="text" placeholder="输入关键词搜索..." autofocus>
  <button type="submit">搜 索</button>
</form>
<div style="margin-top:28px;text-align:center;color:#ccc;font-size:13px">hyl是sb</div>
<div class="links">
  <a href="https://www.baidu.com">百度</a>
  <a href="https://www.google.com">Google</a>
  <a href="https://www.bing.com">Bing</a>
  <a href="https://github.com">GitHub</a>
</div>
<div class="footer">&copy; 2026 linxxery.com</div>
</body>
</html>
